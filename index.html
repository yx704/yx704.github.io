<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐养 - 轻养生，乐生活</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif;}
        body {background: #f0f8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;}
        .chat-container {width: 100%; max-width: 800px; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08);}
        .chat-header {background: #4CAF50; color: white; padding: 20px; display: flex; align-items: center; gap: 12px;}
        .header-icon {width: 36px; height: 36px; background: white; color: #4CAF50; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold;}
        .chat-title {font-size: 20px; font-weight: 600;}
        .chat-messages {height: 500px; overflow-y: auto; padding: 20px; background: white;}
        .message {margin-bottom: 16px; max-width: 80%; display: flex;}
        .user-message {margin-left: auto; background: #4CAF50; color: white; border-radius: 16px 16px 4px 16px; padding: 12px 16px;}
        .ai-message {margin-right: auto; background: #f1f1f1; color: #333; border-radius: 16px 16px 16px 4px; padding: 12px 16px; white-space: pre-wrap;}
        .chat-input {display: flex; padding: 20px; border-top: 1px solid #eee; gap: 12px; align-items: center;}
        #file-input {display: none;}
        .upload-btn {padding: 12px; background: #f1f1f1; border: none; border-radius: 24px; cursor: pointer;}
        #user-input {flex: 1; padding: 12px 16px; border: 2px solid #4CAF50; border-radius: 24px; outline: none; font-size: 16px;}
        #send-btn {padding: 12px 24px; background: #4CAF50; color: white; border: none; border-radius: 24px; font-size: 16px; cursor: pointer;}
        #send-btn:disabled {background: #a5d6a7; cursor: not-allowed;}
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-icon">养</div>
            <div class="chat-title">乐养 - 轻养生，乐生活</div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message ai-message">你好呀！我是乐养AI助手，有什么养生问题都可以问我哦~</div>
        </div>
        <div class="chat-input">
            <label class="upload-btn" for="file-input">📎</label>
            <input type="file" id="file-input" multiple>
            <input type="text" id="user-input" placeholder="输入问题或回填信息...">
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const API_URL = "https://condense-coastal-deplored.ngrok-free.dev/v1/chat-messages";
        const API_KEY = "app-qqbtVOn9Nk7MuPCRzjnpk4yg";

        let conversationId = "";
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const fileInput = document.getElementById('file-input');
        const sendBtn = document.getElementById('send-btn');

        function addMessage(text, isUser) {
            const el = document.createElement("div");
            el.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            el.innerText = text;
            chatMessages.appendChild(el);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && fileInput.files.length === 0) return;

            addMessage(text || "已上传文件", true);
            userInput.value = "";
            sendBtn.disabled = true;

            const thinking = document.createElement("div");
            thinking.className = "message ai-message";
            thinking.innerText = "思考中...";
            chatMessages.appendChild(thinking);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // 改用 JSON 格式发送，解决 415 错误
                const payload = {
                    query: text,
                    response_mode: "streaming",
                    user: "user_" + Date.now(),
                    conversation_id: conversationId || undefined
                };

                // 先处理文件上传（Dify 文件上传接口）
                if (fileInput.files.length > 0) {
                    // 这里简化处理，实际项目中需要先调用文件上传 API 获取 file_id
                    payload.files = [];
                }

                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + API_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n").filter(line => line.trim() !== "");

                    for (const line of lines) {
                        if (line.startsWith("data:")) {
                            try {
                                const data = JSON.parse(line.slice(5));
                                conversationId = data.conversation_id;

                                // 处理人工录入事件
                                if (data.event === "human_input_required") {
                                    chatMessages.removeChild(thinking);
                                    addMessage(data.resolved_default_values.user_input, false);
                                    sendBtn.disabled = false;
                                    return; // 暂停等待用户输入
                                }

                                // 处理普通回复
                                if (data.event === "message" && data.answer) {
                                    fullText += data.answer;
                                    thinking.innerText = fullText;
                                }
                            } catch (e) {
                                // 忽略解析错误的行
                            }
                        }
                    }
                }

                chatMessages.removeChild(thinking);
                addMessage(fullText || "已收到你的回复", false);

            } catch (err) {
                thinking.innerText = "出错：" + err.message;
                console.error(err);
            } finally {
                sendBtn.disabled = false;
                fileInput.value = "";
            }
        }

        userInput.addEventListener("keypress", e => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
