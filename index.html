<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乐养健康助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 430px;
            height: 90vh;
            max-height: 850px;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(90deg, #4CAF50 0%, #66BB6A 100%);
            color: white;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-content {
            flex: 1;
            background: #fafafa;
        }

        .chat-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <div class="header-icon">🌿</div>
            <div>
                <h3>乐养健康助手</h3>
                <p>AI 健康小管家</p>
            </div>
        </div>
        <div class="chat-content">
            <iframe src="https://condense-coastal-deplored.ngrok-free.dev/chat/rqD4v8SwracjhjmT" allow="clipboard-read; clipboard-write"></iframe>
        </div>
    </div>
</body>
</html>
