<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乐养健康助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* 主容器 - 模拟手机聊天界面 */
        .chat-wrapper {
            width: 100%;
            max-width: 430px;
            height: 90vh;
            max-height: 850px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航栏 */
        .chat-header {
            background: linear-gradient(90deg, #4CAF50 0%, #66BB6A 100%);
            color: white;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-text h1 {
            font-size: 17px;
            font-weight: 600;
            margin: 0;
        }

        .header-text p {
            font-size: 12px;
            opacity: 0.9;
            margin: 2px 0 0;
        }

        /* 聊天内容区域 */
        .chat-content {
            flex: 1;
            position: relative;
            background: #fafafa;
        }

        /* Dify 嵌入 iframe */
        .chat-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* 底部安全区域适配 */
        .safe-area {
            height: env(safe-area-inset-bottom, 0px);
            background: #ffffff;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <!-- 顶部导航 -->
        <div class="chat-header">
            <div class="header-icon">🌿</div>
            <div class="header-text">
                <h1>乐养健康助手</h1>
                <p>轻养生，乐生活</p>
            </div>
        </div>

        <!-- 聊天内容区域 -->
        <div class="chat-content">
            <!-- 替换为你的 Dify 应用地址 -->
            <iframe
                src="https://condense-coastal-deplored.ngrok-free.dev/chat/rqD4v8SwracjhjmT"
                allow="clipboard-read; clipboard-write"
                title="乐养健康助手">
            </iframe>
        </div>

        <!-- 适配 iPhone 底部安全区 -->
        <div class="safe-area"></div>
    </div>
</body>
</html>
