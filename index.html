<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐养 - 轻养生，乐生活</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f0f8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .chat-header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background-color: white;
            color: #4CAF50;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }

        .chat-title {
            font-size: 20px;
            font-weight: 600;
        }

        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background-color: white;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            max-width: 80%;
        }

        .user-message {
            margin-left: auto;
            background-color: #4CAF50;
            color: white;
            border-radius: 16px 16px 4px 16px;
            padding: 12px 16px;
        }

        .ai-message {
            margin-right: auto;
            background-color: #f1f1f1;
            color: #333;
            border-radius: 16px 16px 16px 4px;
            padding: 12px 16px;
            white-space: pre-wrap;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            border-top: 1px solid #eee;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #4CAF50;
            border-radius: 24px;
            outline: none;
            font-size: 16px;
        }

        #send-btn {
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #send-btn:disabled {
            background-color: #a5d6a7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-icon">养</div>
            <div class="chat-title">乐养 - 轻养生，乐生活</div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="message ai-message">你好呀！我是乐养AI助手，有什么养生问题都可以问我哦~</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="和我聊聊养生相关的问题吧...">
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // ngrok 公网地址
        const DIFY_API_URL = "https://condense-coastal-deplored.ngrok-free.dev/v1/chat-messages";
        // 你的 API 密钥
        const DIFY_API_KEY = "app-qqbtVOn9Nk7MuPCRzjnpk4yg";

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 添加用户消息
            addMessage(text, "user");
            userInput.value = "";
            sendBtn.disabled = true;

            // 创建 AI 消息容器（流式输出用）
            const aiMessageEl = document.createElement("div");
            aiMessageEl.className = "message ai-message";
            chatMessages.appendChild(aiMessageEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch(DIFY_API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + DIFY_API_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: {},
                        query: text,
                        response_mode: "streaming", // 关键！改成流式输出
                        user: "github-pages-user-" + Math.random().toString(36).substr(2, 8)
                    })
                });

                if (!response.ok) {
                    throw new Error(`请求失败: ${response.status}`);
                }

                // 处理流式响应
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // 解析每一段数据
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n").filter(line => line.trim() !== "");

                    for (const line of lines) {
                        if (line.startsWith("data:")) {
                            try {
                                const data = JSON.parse(line.substring(5));
                                if (data.event === "message" && data.answer) {
                                    fullText += data.answer;
                                    aiMessageEl.innerText = fullText;
                                    chatMessages.scrollTop = chatMessages.scrollHeight;
                                }
                            } catch (e) {
                                // 忽略解析错误的行
                            }
                        }
                    }
                }

            } catch (err) {
                aiMessageEl.innerText = "出错啦：" + err.message;
                console.error(err);
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, type) {
            const messageEl = document.createElement("div");
            messageEl.className = `message ${type}-message`;
            messageEl.innerText = text;
            chatMessages.appendChild(messageEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 支持回车发送
        userInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
